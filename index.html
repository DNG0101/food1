<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Manager Pro - Updated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs" type="module"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root{
      --bg:#0a0f19;--card:#12192a;--card2:#1b263b;--txt:#e9eef7;--muted:#93a2bb;--line:#2a3550;
      --pri:#6d5dfc;--ok:#18b97e;--danger:#f26d6d;--warn:#f2bd6d;
    }
    body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:16px;}
    .wrap{max-width:1400px;margin:auto;display:grid;grid-template-columns:420px 1fr;gap:16px;}
    @media(max-width:1050px){.wrap{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
    .hd{padding:14px 16px;background:var(--card2);border-bottom:1px solid var(--line);font-weight:700;display:flex;justify-content:space-between;gap:10px;align-items:center}
    .bd{padding:14px 16px}
    .grid{display:grid;gap:10px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row3{display:grid;grid-template-columns:1fr 1fr auto;gap:10px}
    label{font-size:12px;color:var(--muted);font-weight:600}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;background:#0f1524;color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:9px 10px}
    textarea{min-height:120px;resize:vertical}
    .btn{border:1px solid var(--line);background:#222e49;color:var(--txt);border-radius:10px;padding:8px 12px;cursor:pointer;font-weight:600}
    .btn:hover{filter:brightness(1.08)}
    .btn.primary{background:var(--pri);border-color:var(--pri)}
    .btn.ok{background:var(--ok);border-color:var(--ok)}
    .btn.danger{background:var(--danger);border-color:var(--danger)}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;background:#0f1524;border:1px solid var(--line);border-radius:999px}
    .list{display:grid;gap:8px;max-height:240px;overflow:auto;padding-right:2px}
    .item{border:1px solid var(--line);border-radius:10px;padding:10px;background:#0f1524;display:grid;gap:8px}
    .itemHead{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .badge{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid}
    .veg{color:#6bf0b7;border-color:#2d7f60;background:#163829}
    .nonveg{color:#ff9d9d;border-color:#8d4343;background:#3a1919}
    .pdfStrip{display:flex;gap:10px;overflow:auto;padding:8px;border:1px dashed var(--line);border-radius:10px;min-height:120px}
    .pdfThumb{border:1px solid var(--line);border-radius:8px;min-width:120px;background:#0f1524;padding:6px;text-align:center}
    .pdfThumb canvas{display:block;max-width:100%;height:auto;border-radius:6px}
    iframe{width:100%;height:620px;border:0;background:#fff;border-radius:12px}
    .muted{color:var(--muted);font-size:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .stat{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="hd">
        <span>Part A - Editor</span>
        <span id="summary" class="stat">0 items</span>
      </div>
      <div class="bd grid">
        <div class="row">
          <div class="grid">
            <label>Heading</label>
            <input id="headingInput" placeholder="e.g. Starters" />
          </div>
          <div class="grid">
            <label>Type Filter Sync</label>
            <select id="globalType">
              <option value="all">All</option>
              <option value="veg">Veg</option>
              <option value="nonveg">Non-Veg</option>
            </select>
          </div>
        </div>

        <div class="row3">
          <div class="grid">
            <label>Item Name</label>
            <input id="nameInput" placeholder="Paneer Tikka" />
          </div>
          <div class="grid">
            <label>Price</label>
            <input id="priceInput" type="number" min="0" placeholder="199" />
          </div>
          <button id="addItemBtn" class="btn primary" style="align-self:end">+ Add</button>
        </div>

        <div class="row">
          <div class="grid">
            <label>Item Type</label>
            <select id="typeInput">
              <option value="veg">Veg</option>
              <option value="nonveg">Non-Veg</option>
            </select>
          </div>
          <div class="grid">
            <label>Description</label>
            <input id="descInput" placeholder="Tasty and fresh" />
          </div>
        </div>

        <div class="actions">
          <label class="pill"><input id="showMenuPages" type="checkbox" checked /> Show Menu (PDF pages)</label>
          <label class="pill"><input id="showItemList" type="checkbox" checked /> Show Item List</label>
          <button id="clearBtn" class="btn danger">Clear All Items</button>
        </div>

        <div class="grid">
          <label>Upload Menu PDF (optional)</label>
          <input id="pdfInput" type="file" accept="application/pdf" />
          <div id="pdfStrip" class="pdfStrip"><span class="muted">No PDF uploaded</span></div>
        </div>

        <div class="grid">
          <label>Items</label>
          <div id="itemsList" class="list"></div>
        </div>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <div class="hd">
          <span>Part B - Live Preview</span>
          <div class="actions">
            <button id="refreshPreviewBtn" class="btn">Refresh</button>
            <button id="shootBtn" class="btn ok">Shoot Part C -> Part D</button>
          </div>
        </div>
        <div class="bd">
          <iframe id="previewFrame"></iframe>
        </div>
      </div>

      <div class="card">
        <div class="hd"><span>Part C - Generated Code (no html/head/title)</span></div>
        <div class="bd">
          <textarea id="partCTxt" spellcheck="false"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="hd"><span>Part D - Shot Output</span></div>
        <div class="bd">
          <textarea id="partDTxt" spellcheck="false"></textarea>
        </div>
      </div>
    </section>
  </div>

  <script>
    const state = {
      heading: "Menu",
      items: [],
      pdfPages: [],
      showMenuPages: true,
      showItemList: true,
      filter: "all"
    };

    const el = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
    const currency = (n) => "₹" + Number(n || 0).toFixed(0);

    function syncControlsToState() {
      state.heading = el("headingInput").value.trim() || "Menu";
      state.showMenuPages = el("showMenuPages").checked;
      state.showItemList = el("showItemList").checked;
      state.filter = el("globalType").value;
    }

    function addItem() {
      syncControlsToState();
      const name = el("nameInput").value.trim();
      const price = Number(el("priceInput").value || 0);
      const type = el("typeInput").value;
      const desc = el("descInput").value.trim();

      if (!name) return alert("Item name is required.");
      if (price < 0) return alert("Price cannot be negative.");

      state.items.push({ id: crypto.randomUUID(), name, price, type, desc });
      el("nameInput").value = "";
      el("priceInput").value = "";
      el("descInput").value = "";
      renderEditor();
      renderEverything();
    }

    function deleteItem(id) {
      state.items = state.items.filter((i) => i.id !== id);
      renderEditor();
      renderEverything();
    }

    function renderEditor() {
      const box = el("itemsList");
      if (!state.items.length) {
        box.innerHTML = '<div class="muted">No items added</div>';
      } else {
        box.innerHTML = state.items.map((i) => `
          <div class="item">
            <div class="itemHead">
              <strong>${esc(i.name)}</strong>
              <span class="badge ${i.type === "veg" ? "veg" : "nonveg"}">${i.type === "veg" ? "Veg" : "Non-Veg"}</span>
            </div>
            <div class="muted">${esc(i.desc || "No description")}</div>
            <div class="itemHead">
              <span>${currency(i.price)}</span>
              <button class="btn danger" onclick="deleteItem('${i.id}')">Delete</button>
            </div>
          </div>
        `).join("");
      }
      el("summary").textContent = `${state.items.length} items`;
    }

    function getFilteredItems() {
      if (state.filter === "all") return state.items;
      return state.items.filter((i) => i.type === state.filter);
    }

    function generatePreviewBodyFragment() {
      const itemsJson = JSON.stringify(getFilteredItems());
      const pagesJson = JSON.stringify(state.pdfPages);
      const heading = esc(state.heading);

      return `
<style>
  :root{--bg:#f6f8ff;--card:#fff;--line:#d7dff0;--txt:#1a2233;--mut:#5e6f8d;--veg:#1ba56f;--non:#d45555;--pri:#5f4df5}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:16px}
  .page{max-width:980px;margin:auto;display:grid;gap:14px}
  .hero{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .hero h2{font-size:20px}
  .pill{padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12px}
  .grid{display:grid;grid-template-columns:1fr 320px;gap:14px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .hd{padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700}
  .bd{padding:12px 14px}
  .menuStrip{display:flex;gap:10px;overflow:auto}
  .menuStrip img{height:140px;border-radius:10px;border:1px solid var(--line);background:#fff}
  .list{display:grid;gap:10px}
  .item{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:10px}
  .name{font-weight:700}
  .mut{font-size:12px;color:var(--mut)}
  .badge{font-size:11px;padding:2px 8px;border-radius:999px;color:#fff}
  .veg{background:var(--veg)} .nonveg{background:var(--non)}
  .ctrl{display:flex;align-items:center;gap:8px}
  .ctrl button{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer}
  .ctrl .add{background:var(--pri);color:#fff;border-color:var(--pri);width:auto;padding:0 12px}
  .cartItem{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px dashed var(--line)}
  .cartItem:last-child{border-bottom:none}
  .total{font-weight:800;font-size:16px;padding-top:8px}
</style>

<div class="page">
  <div class="hero">
    <h2>${heading}</h2>
    <span class="pill" id="qtyBadge">Cart Qty: 0</span>
  </div>

  <div class="grid">
    <section class="panel" id="menuPanel" style="display:${state.showMenuPages ? "block" : "none"}">
      <div class="hd">Menu Pages</div>
      <div class="bd">
        <div class="menuStrip" id="menuStrip"></div>
      </div>
    </section>

    <section class="panel">
      <div class="hd">Cart</div>
      <div class="bd">
        <div id="cartItems" class="mut">No items in cart</div>
        <div id="total" class="total">Total: ₹0</div>
      </div>
    </section>
  </div>

  <section class="panel" id="listPanel" style="display:${state.showItemList ? "block" : "none"}">
    <div class="hd">Items</div>
    <div class="bd">
      <div id="itemsRoot" class="list"></div>
    </div>
  </section>
</div>

<script>
  const items = ${itemsJson};
  const menuPages = ${pagesJson};
  const cart = new Map();

  function money(v){ return "₹" + Number(v||0).toFixed(0); }

  function renderMenuPages(){
    const strip = document.getElementById("menuStrip");
    if(!menuPages.length){ strip.innerHTML = '<span class="mut">No PDF pages available</span>'; return; }
    strip.innerHTML = menuPages.map((p,i)=>'<img loading="lazy" alt="page-'+(i+1)+'" src="'+p+'">').join("");
  }

  function changeQty(id, delta){
    const prev = cart.get(id) || 0;
    const next = Math.max(0, prev + delta);
    if(next === 0) cart.delete(id); else cart.set(id, next);
    renderItems(); renderCart();
  }

  function renderItems(){
    const root = document.getElementById("itemsRoot");
    if(!items.length){ root.innerHTML = '<div class="mut">No items available for selected filter.</div>'; return; }
    root.innerHTML = items.map(i=>{
      const q = cart.get(i.id) || 0;
      return '<div class="item">'
        + '<div><div class="name">' + i.name + ' <span class="badge ' + (i.type==="veg"?"veg":"nonveg") + '">' + (i.type==="veg"?"Veg":"Non-Veg") + '</span></div>'
        + '<div class="mut">' + (i.desc || "No description") + '</div><div class="mut">' + money(i.price) + '</div></div>'
        + '<div class="ctrl">' + (q===0
            ? '<button class="add" onclick="changeQty(\\''+i.id+'\\',1)">Add</button>'
            : '<button onclick="changeQty(\\''+i.id+'\\',-1)">-</button><strong>'+q+'</strong><button onclick="changeQty(\\''+i.id+'\\',1)">+</button>'
          )
        + '</div></div>';
    }).join("");
  }

  function renderCart(){
    const c = document.getElementById("cartItems");
    const qtyBadge = document.getElementById("qtyBadge");
    let totalQty = 0, total = 0;
    const rows = [];
    for(const i of items){
      const q = cart.get(i.id) || 0;
      if(!q) continue;
      totalQty += q;
      total += q * Number(i.price || 0);
      rows.push('<div class="cartItem"><span>'+i.name+' x '+q+'</span><strong>'+money(q*i.price)+'</strong></div>');
    }
    c.innerHTML = rows.length ? rows.join("") : 'No items in cart';
    document.getElementById("total").textContent = "Total: " + money(total);
    qtyBadge.textContent = "Cart Qty: " + totalQty;
  }

  renderMenuPages();
  renderItems();
  renderCart();
<\/script>
`;
    }

    function generatePreviewDocument() {
      return `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Preview</title></head><body>${generatePreviewBodyFragment()}</body></html>`;
    }

    function renderPreview() {
      el("previewFrame").srcdoc = generatePreviewDocument();
    }

    function renderPartC() {
      el("partCTxt").value = generatePreviewBodyFragment().trim();
    }

    function shootToPartD() {
      el("partDTxt").value = el("partCTxt").value;
    }

    async function renderPdfThumbnails(file) {
      state.pdfPages = [];
      const strip = el("pdfStrip");
      strip.innerHTML = '<span class="muted">Reading PDF...</span>';

      const pdfjs = globalThis.pdfjsLib;
      if (!pdfjs) {
        strip.innerHTML = '<span class="muted">PDF preview library not ready.</span>';
        return;
      }

      const bytes = new Uint8Array(await file.arrayBuffer());
      const pdf = await pdfjs.getDocument({ data: bytes }).promise;
      strip.innerHTML = "";

      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const viewport = page.getViewport({ scale: 0.38 });
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: ctx, viewport }).promise;
        state.pdfPages.push(canvas.toDataURL("image/jpeg", 0.86));

        const box = document.createElement("div");
        box.className = "pdfThumb";
        box.innerHTML = `<div class="muted" style="margin-bottom:6px">Page ${p}</div>`;
        box.appendChild(canvas);
        strip.appendChild(box);
      }
      if (!pdf.numPages) strip.innerHTML = '<span class="muted">No pages found.</span>';
      renderEverything();
    }

    function clearAll() {
      if (!confirm("Clear all items?")) return;
      state.items = [];
      renderEditor();
      renderEverything();
    }

    function renderEverything() {
      syncControlsToState();
      renderPreview();
      renderPartC();
    }

    async function init() {
      renderEditor();
      renderEverything();

      el("addItemBtn").addEventListener("click", addItem);
      el("refreshPreviewBtn").addEventListener("click", renderEverything);
      el("shootBtn").addEventListener("click", shootToPartD);
      el("clearBtn").addEventListener("click", clearAll);

      ["headingInput","globalType","showMenuPages","showItemList"].forEach((id) => {
        el(id).addEventListener("input", renderEverything);
        el(id).addEventListener("change", renderEverything);
      });

      el("pdfInput").addEventListener("change", async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.type !== "application/pdf") return alert("Please upload a valid PDF.");
        await renderPdfThumbnails(file);
      });

      const runQuickChecks = () => {
        console.assert(typeof generatePreviewBodyFragment() === "string", "Part C generation failed");
        console.assert(el("partCTxt").value.includes("<style>"), "Part C should include CSS");
        console.assert(!el("partCTxt").value.includes("<title>"), "Part C should not include title/html/head wrapper");
      };
      runQuickChecks();
    }

    init();
  </script>
</body>
</html>
