<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menu Builder – Multi‑Heading with Images</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f1117;--surface:#1a1e2e;--surface2:#222638;
  --border:#2e3350;--accent:#7c5cbf;--accent-h:#9370d8;
  --veg:#22c55e;--nonveg:#ef4444;
  --text:#e2e8f0;--muted:#8892a4;--card-bg:#181c2a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
@media(max-width:860px){.app{grid-template-columns:1fr}}
.builder{padding:32px 28px;border-right:1px solid var(--border);overflow-y:auto}
.pane-head{font-family:'Syne';font-size:20px;font-weight:800;display:flex;align-items:center;gap:10px;margin-bottom:24px}
.pane-head .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.slabel{font-family:'Syne';font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.f{margin-bottom:12px}
.f label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.f input,.f textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);outline:none}
.f input:focus,.f textarea:focus{border-color:var(--accent)}
.veg-row{display:flex;gap:8px}
.vbtn{flex:1;padding:9px;border-radius:8px;border:2px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'Syne';font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.vbtn.av{border-color:var(--veg);color:var(--veg);background:rgba(34,197,94,.08)}
.vbtn.an{border-color:var(--nonveg);color:var(--nonveg);background:rgba(239,68,68,.08)}
.trow{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.tswitch{position:relative;width:42px;height:22px}
.tswitch input{opacity:0;width:0;height:0}
.tslider{position:absolute;cursor:pointer;inset:0;background:var(--surface2);border-radius:22px;border:1px solid var(--border);transition:.3s}
.tslider::before{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--muted);bottom:3px;left:3px;transition:.3s}
.tswitch input:checked+.tslider{background:var(--accent);border-color:var(--accent)}
.tswitch input:checked+.tslider::before{transform:translateX(20px);background:#fff}
#vblock{display:none}
.vtable{width:100%;border-collapse:collapse;margin-bottom:10px}
.vtable th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);padding:7px 8px;border-bottom:1px solid var(--border)}
.vrow td{padding:6px 5px}
.vrow td input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 9px;width:100%}
.delbtn{background:none;border:none;color:var(--nonveg);cursor:pointer;font-size:17px}
.addvarbtn{background:none;border:1px dashed var(--border);color:var(--muted);padding:8px 14px;border-radius:8px;cursor:pointer;width:100%}
.btnrow{display:flex;gap:10px;margin-top:6px}
.btn{flex:1;padding:11px 18px;border-radius:10px;font-family:'Syne';font-size:13px;font-weight:700;cursor:pointer;border:none}
.btn-pre{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-sub{background:var(--accent);color:#fff}
.btn-clr{background:none;color:var(--muted);border:1px solid var(--border);flex:0 0 auto}
#ilistwrap{display:none}
.ichip{display:flex;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:7px}
.cdel{background:none;border:none;color:var(--muted);cursor:pointer}
.output{padding:32px 28px;display:flex;flex-direction:column;overflow-y:auto}
.tabs{display:flex;margin-bottom:18px;border-bottom:1px solid var(--border)}
.tbtn{padding:9px 18px;background:none;border:none;font-family:'Syne';font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tbtn.on{color:var(--accent);border-bottom-color:var(--accent)}
.prevwrap{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:24px;min-height:300px;overflow:auto}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.mcard-img{width:64px;height:64px;border-radius:8px;background:var(--surface2);flex-shrink:0;overflow:hidden}
.mcard-img img{width:100%;height:100%;object-fit:cover}
.mcard-body{flex:1;cursor:pointer}
.mcard-name{font-family:'Syne';font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.vdot{width:14px;height:14px;border-radius:3px;border:2px solid;display:inline-flex;align-items:center;justify-content:center}
.vdot::after{content:'';width:6px;height:6px;border-radius:50%}
.vdot.veg{border-color:var(--veg)}.vdot.veg::after{background:var(--veg)}
.vdot.nonveg{border-color:var(--nonveg)}.vdot.nonveg::after{background:var(--nonveg)}
.addbtn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.vis{opacity:1;pointer-events:all}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;max-width:600px;width:90%;max-height:80vh;overflow:auto}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(56px);background:var(--accent);color:#fff;padding:11px 22px;border-radius:10px;transition:transform .3s;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.img-preview{max-width:100px;max-height:100px;border-radius:8px;margin-top:5px}
</style>
</head>
<body>
<div class="app">
  <div class="builder">
    <div class="pane-head"><span class="dot"></span>Menu Builder</div>

    <!-- Heading selection / creation -->
    <div class="card">
      <div class="slabel">📌 Main Heading (Superset)</div>
      <div class="f">
        <label>Select existing heading from Drive</label>
        <select id="headingSelect" onchange="selectHeading()">
          <option value="">-- Load from Drive --</option>
        </select>
      </div>
      <div class="f">
        <label>Or create new heading</label>
        <input id="newHeading" type="text" placeholder="e.g., Pizza Combos"/>
      </div>
      <button class="btn btn-pre" onclick="loadFromDrive()" style="margin-top:5px">📂 Load Existing Menu</button>
    </div>

    <div class="card">
      <div class="slabel">🍕 Item Details (Subset)</div>
      <div class="f"><label>Item Name</label><input id="iname" type="text"/></div>
      <div class="f">
        <label>Type</label>
        <div class="veg-row">
          <button class="vbtn av" id="bv" onclick="setType('veg')"><span class="sq" style="background:var(--veg)"></span>Veg</button>
          <button class="vbtn" id="bn" onclick="setType('nonveg')"><span class="sq" style="background:var(--nonveg)"></span>Non-Veg</button>
        </div>
      </div>
      <div class="f"><label>Description</label><input id="idesc" type="text"/></div>
      <div class="f"><label>Preparation Time</label><input id="itime" type="text"/></div>
      <div class="f">
        <label>Item Image (upload)</label>
        <input type="file" id="itemImageFile" accept="image/*" onchange="uploadItemImage(this.files[0])"/>
        <div id="itemImagePreview"></div>
        <input type="hidden" id="itemImageUrl"/>
      </div>
    </div>

    <div class="card">
      <div class="slabel">💰 Variations (each can have its own image)</div>
      <div class="trow">
        <label class="tswitch"><input type="checkbox" id="hasvar" onchange="toggleVar()"/><span class="tslider"></span></label>
        <span>Has variations</span>
      </div>
      <div id="dprice"><div class="f"><label>Base Price (₹)</label><input id="iprice" type="number"/></div></div>
      <div id="vblock">
        <table class="vtable"><thead><tr><th>Variation Name</th><th>Price (₹)</th><th>Image</th><th></th></tr></thead><tbody id="vtbody"></tbody></table>
        <button class="addvarbtn" onclick="addVarRow()">+ Add Variation</button>
      </div>
    </div>

    <div class="btnrow">
      <button class="btn btn-pre" onclick="previewItem()">👁 Preview</button>
      <button class="btn btn-sub" onclick="submitItem()">✅ Add to Menu</button>
      <button class="btn btn-clr" onclick="clearForm()">✕ Clear</button>
    </div>

    <div id="ilistwrap">
      <hr class="sep"/>
      <div class="slabel">📋 Items under current heading</div>
      <div id="ilist"></div>
      <div class="btnrow" style="margin-top:8px">
        <button class="btn btn-sub" onclick="saveToDrive()" style="flex:1">💾 Save to Drive (Merge)</button>
        <button class="btn btn-pre" onclick="showLivePreview()" style="flex:0 0 auto">👁 Live Preview</button>
      </div>
    </div>
  </div>

  <div class="output">
    <div class="pane-head"><span class="dot" style="background:#22c55e"></span>Live Menu Preview</div>
    <div class="prevwrap" id="livePreviewArea">
      <div id="livePreviewContent">Select a heading or load from Drive</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== CONFIGURATION ==========
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzewI6M6VmYsbG69RNk_YqBIvHyE1VmVgO-UzNHZMmMectheDFZU6W9u4157QIPLdfD5w/exec"; // REPLACE WITH YOUR ACTUAL URL

// ========== GLOBAL STATE ==========
let itype = 'veg';
let currentItems = [];      // items under the selected heading
let currentHeading = "";
let vrc = 0;
let allHeadingsData = {};   // { heading1: [items], heading2: [items] }

// ========== IMAGE UPLOAD ==========
async function uploadImageToDrive(file, fileName) {
  const formData = new FormData();
  formData.append("action", "uploadImage");
  formData.append("imageBlob", file);
  formData.append("fileName", fileName);
  const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: formData });
  const json = await res.json();
  if (json.success) return json.url;
  else throw new Error(json.error);
}

async function uploadItemImage(file) {
  if (!file) return;
  showToast("Uploading image...");
  try {
    const url = await uploadImageToDrive(file, file.name);
    document.getElementById("itemImageUrl").value = url;
    document.getElementById("itemImagePreview").innerHTML = `<img src="${url}" class="img-preview">`;
    showToast("✅ Image uploaded");
  } catch(e) { showToast("❌ Upload failed"); }
}

async function uploadVarImage(file, varId) {
  if (!file) return;
  try {
    const url = await uploadImageToDrive(file, file.name);
    document.getElementById(`varImg_${varId}`).value = url;
    document.getElementById(`varImgPreview_${varId}`).innerHTML = `<img src="${url}" class="img-preview" style="max-width:50px">`;
    showToast("✅ Variation image uploaded");
  } catch(e) { showToast("❌ Upload failed"); }
}

// ========== VARIATIONS ==========
function addVarRow() {
  vrc++;
  const id = vrc;
  const tr = document.createElement('tr');
  tr.className = 'vrow'; tr.id = `vr${id}`;
  tr.innerHTML = `
    <td><input type="text" placeholder="Name" id="vn${id}"/></td>
    <td><input type="number" placeholder="Price" id="vp${id}"/></td>
    <td>
      <input type="file" accept="image/*" onchange="uploadVarImage(this.files[0], ${id})"/>
      <input type="hidden" id="varImg_${id}"/>
      <div id="varImgPreview_${id}"></div>
    </td>
    <td><button class="delbtn" onclick="delVar(${id})">✕</button></td>
  `;
  document.getElementById('vtbody').appendChild(tr);
}
function delVar(id) { document.getElementById(`vr${id}`)?.remove(); }
function getVars() {
  return [...document.querySelectorAll('.vrow')].map(r => {
    const id = r.id.replace('vr','');
    return {
      name: document.getElementById(`vn${id}`)?.value.trim() || "",
      price: document.getElementById(`vp${id}`)?.value.trim() || "",
      image: document.getElementById(`varImg_${id}`)?.value || ""
    };
  }).filter(v => v.name);
}

// ========== COLLECT FORM ==========
function collectItem() {
  return {
    name: document.getElementById('iname').value.trim(),
    type: itype,
    desc: document.getElementById('idesc').value.trim(),
    time: document.getElementById('itime').value.trim(),
    image: document.getElementById('itemImageUrl').value,
    price: document.getElementById('iprice').value.trim(),
    hasVar: document.getElementById('hasvar').checked,
    vars: document.getElementById('hasvar').checked ? getVars() : []
  };
}

function clearForm() {
  document.getElementById('iname').value = '';
  document.getElementById('idesc').value = '';
  document.getElementById('itime').value = '';
  document.getElementById('iprice').value = '';
  document.getElementById('hasvar').checked = false;
  document.getElementById('vtbody').innerHTML = '';
  vrc = 0;
  toggleVar();
  setType('veg');
  document.getElementById('itemImageFile').value = '';
  document.getElementById('itemImagePreview').innerHTML = '';
  document.getElementById('itemImageUrl').value = '';
}

function setType(t) { itype = t;
  document.getElementById('bv').className = 'vbtn' + (t==='veg'?' av':'');
  document.getElementById('bn').className = 'vbtn' + (t==='nonveg'?' an':'');
}
function toggleVar() {
  const on = document.getElementById('hasvar').checked;
  document.getElementById('dprice').style.display = on ? 'none' : 'block';
  document.getElementById('vblock').style.display = on ? 'block' : 'none';
  if(on && !document.querySelector('.vrow')) addVarRow();
}

// ========== SUBMIT ITEM ==========
function submitItem() {
  const item = collectItem();
  if(!item.name) { showToast("Enter item name"); return; }
  currentItems.push(item);
  renderItemList();
  clearForm();
  showToast(`✅ "${item.name}" added`);
}

function renderItemList() {
  const wrap = document.getElementById('ilistwrap');
  if(!currentItems.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  document.getElementById('ilist').innerHTML = currentItems.map((it,idx) => `
    <div class="ichip">
      <div><strong>${escapeHtml(it.name)}</strong> ${it.hasVar ? `(${it.vars.length} vars)` : (it.price ? `₹${it.price}` : '')}</div>
      <button class="cdel" onclick="deleteItem(${idx})">✕</button>
    </div>
  `).join('');
}

function deleteItem(idx) {
  currentItems.splice(idx,1);
  renderItemList();
  showToast("Item deleted");
}

// ========== PREVIEW ==========
function previewItem() {
  const item = collectItem();
  if(!item.name) return;
  renderPreview([item], "Preview");
}

function renderPreview(items, heading) {
  const container = document.getElementById('livePreviewContent');
  if(!items.length) { container.innerHTML = "<div>No items</div>"; return; }
  container.innerHTML = `<h2>${escapeHtml(heading)}</h2>` + items.map(d => `
    <div class="mcard">
      <div class="mcard-img"><img src="${d.image||''}" onerror="this.src=''"></div>
      <div class="mcard-body">
        <div class="mcard-name"><span class="vdot ${d.type}"></span>${escapeHtml(d.name)}</div>
        <div class="mcard-desc">${escapeHtml(d.desc)}</div>
        ${!d.hasVar && d.price ? `<div class="mcard-price">₹${escapeHtml(d.price)}</div>` : ''}
      </div>
      <button class="addbtn" onclick="alert('Added ${d.name}')">Add</button>
    </div>
  `).join('');
}

// ========== DRIVE OPERATIONS ==========
async function loadFromDrive() {
  showToast("Loading from Drive...");
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const html = await res.text();
    // Parse the HTML to extract headings and items
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const h1s = doc.querySelectorAll('h1');
    const newData = {};
    for(let h1 of h1s) {
      let heading = h1.textContent.trim();
      let items = [];
      let next = h1.nextElementSibling;
      while(next && next.classList && next.classList.contains('mcard')) {
        // Extract item data from the card (simplified: just name and image)
        let nameEl = next.querySelector('.mcard-name');
        let name = nameEl ? nameEl.textContent.replace(/[^\w\s]/g,'').trim() : '';
        let imgEl = next.querySelector('.mcard-img img');
        let img = imgEl ? imgEl.src : '';
        items.push({ name, image: img }); // We only store basic info for selection
        next = next.nextElementSibling;
      }
      newData[heading] = items;
    }
    allHeadingsData = newData;
    const select = document.getElementById('headingSelect');
    select.innerHTML = '<option value="">-- Select heading --</option>';
    for(let h in newData) {
      select.innerHTML += `<option value="${escapeHtml(h)}">${escapeHtml(h)} (${newData[h].length} items)</option>`;
    }
    showToast("Loaded headings from Drive");
  } catch(e) { showToast("Error loading: "+e.message); }
}

function selectHeading() {
  const select = document.getElementById('headingSelect');
  const heading = select.value;
  if(!heading) return;
  currentHeading = heading;
  currentItems = allHeadingsData[heading] || [];
  renderItemList();
  renderPreview(currentItems, currentHeading);
  document.getElementById('newHeading').value = heading;
}

async function saveToDrive() {
  let heading = document.getElementById('newHeading').value.trim();
  if(!heading && currentHeading) heading = currentHeading;
  if(!heading) { showToast("Select or enter a heading"); return; }
  if(currentItems.length === 0) { showToast("No items to save"); return; }
  const fullHtml = buildFullHtml(heading, currentItems);
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: fullHtml, headers: {'Content-Type':'text/plain'} });
    if(res.ok) {
      showToast("✅ Drive updated (merged)");
      await loadFromDrive(); // reload headings
      selectHeading();
    } else showToast("Update failed");
  } catch(e) { showToast("Error: "+e.message); }
}

function buildFullHtml(heading, items) {
  const cardsHtml = items.map(d => {
    const dotColor = d.type === 'veg' ? '#22c55e' : '#ef4444';
    const imgTag = d.image ? `<img src="${d.image}" style="width:64px;height:64px;object-fit:cover;">` : '';
    const priceHtml = !d.hasVar && d.price ? `<div class="mcard-price">₹${d.price}</div>` : '';
    return `<div class="mcard">
      <div class="mcard-img">${imgTag}</div>
      <div class="mcard-body">
        <div class="mcard-name"><span class="vdot" style="border-color:${dotColor}"><span style="background:${dotColor}"></span></span>${escapeHtml(d.name)}</div>
        <div class="mcard-desc">${escapeHtml(d.desc)}</div>
        ${priceHtml}
      </div>
      <button class="addbtn" onclick="alert('Added ${escapeHtml(d.name)}')">Add</button>
    </div>`;
  }).join('');
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${escapeHtml(heading)}</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"><style>
    :root{--bg:#0f1117;--surface:#1a1e2e;--surface2:#222638;--border:#2e3350;--accent:#7c5cbf;--text:#e2e8f0;--muted:#8892a4}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding:32px 20px;max-width:680px;margin:0 auto}
    h1{font-family:'Syne';font-size:22px;font-weight:800;color:#fff}
    .mcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:14px;margin-bottom:12px}
    .mcard-img{width:64px;height:64px;border-radius:8px;background:var(--surface2);overflow:hidden}
    .mcard-body{flex:1}
    .mcard-name{font-family:'Syne';font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
    .vdot{width:14px;height:14px;border-radius:3px;border:2px solid;display:inline-flex;align-items:center;justify-content:center}
    .vdot span{width:6px;height:6px;border-radius:50%;display:block}
    .addbtn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer}
  </style></head><body><h1>${escapeHtml(heading)}</h1>${cardsHtml}</body></html>`;
}

async function showLivePreview() {
  const res = await fetch(APPS_SCRIPT_URL);
  const html = await res.text();
  document.getElementById('livePreviewContent').innerHTML = `<iframe srcdoc="${escapeHtml(html).replace(/"/g, '&quot;')}" style="width:100%; height:500px; border:none; background:white;"></iframe>`;
}

// ========== UTILITIES ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function escapeHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function switchTab() {} // not used
</script>
</body>
</html>
